<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | Specs & Shade</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans antialiased flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full bg-zinc-900 border border-zinc-800 rounded-2xl p-8 text-center shadow-2xl mx-4">
        <!-- Success Icon -->
        <div class="w-16 h-16 bg-emerald-950 border border-emerald-800 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"></path>
            </svg>
        </div>

        <h1 class="text-2xl font-black tracking-tight text-white mb-3">Order Logged Successfully</h1>
        <p class="text-zinc-400 text-sm leading-relaxed mb-8">
            Your details have been securely transmitted to our verification queue. We will review the receipt log and process your dispatch.
        </p>

        <!-- Back to Website Button -->
        <a href="index.html" class="inline-block w-full bg-white text-black font-bold py-3.5 rounded-xl hover:bg-zinc-200 transition-colors duration-200 shadow-md">
            Return to Storefront
        </a>
    </div>

</body>
</html>
