<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard | Specs & Shade</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans antialiased">

    <nav class="bg-zinc-900 border-b border-zinc-800/50 h-20 flex items-center justify-between px-8">
        <div class="flex items-center space-x-3">
            <span class="text-lg font-black tracking-widest uppercase text-white">Specs & Shade</span>
            <span class="bg-zinc-800 text-zinc-400 text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded border border-zinc-700">Live Database Panel</span>
        </div>
        <a href="index.html" class="text-zinc-400 hover:text-white text-sm font-semibold transition-colors">&larr; View Storefront</a>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 h-fit sticky top-28">
            <h2 class="text-xl font-black text-white mb-2">Add New Product</h2>
            <p class="text-zinc-500 text-xs mb-6">Instantly updates the live website storefront.</p>
            
            <form id="add-product-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2">Frame Name</label>
                    <input type="text" id="prod-title" required placeholder="e.g., Midnight Aviator" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-zinc-500 transition">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2">Specifications</label>
                    <input type="text" id="prod-spec" required placeholder="e.g., Matte Steel Frame / UV Block" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-zinc-500 transition">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2">Price Tag</label>
                    <input type="text" id="prod-price" required placeholder="e.g., Rs. 3,100" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-zinc-500 transition">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2">Photo URL</label>
                    <input type="url" id="prod-url" required placeholder="https://images.unsplash.com/..." class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-zinc-500 transition">
                </div>

                <button type="submit" class="w-full bg-white text-black font-bold py-2.5 text-sm rounded-xl hover:bg-zinc-200 transition cursor-pointer mt-2">
                    Publish Product Live
                </button>
            </form>
        </div>

        <div class="lg:col-span-2">
            <div class="mb-6">
                <h2 class="text-2xl font-black text-white">Active Store Inventory</h2>
                <p class="text-sm text-zinc-500">Deletions committed here will disappear from customer layout view instantly.</p>
            </div>
            <div id="admin-inventory-list" class="space-y-3"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://hlctahkdvdfcrhoqfxzo.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_CUazdiJCEdeIEbrDv8Ji7g_XIQ0BeqR";

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function fetchAndRenderInventory() {
            const container = document.getElementById('admin-inventory-list');
            container.innerHTML = "<p class='text-zinc-500 text-xs py-4'>Querying table contents...</p>";

            try {
                const { data: inventory, error } = await supabaseClient
                    .from('products')
                    .select('*');

                if (error) {
                    container.innerHTML = "<p class='text-red-400 text-xs py-4'>Error fetching database contents.</p>";
                    return;
                }

                if (!inventory || inventory.length === 0) {
                    container.innerHTML = "<p class='text-zinc-500 text-xs py-4'>Inventory table is completely empty.</p>";
                    return;
                }

                container.innerHTML = "";
                inventory.forEach(item => {
                    container.innerHTML += `
                        <div class="bg-zinc-900 border border-zinc-800/60 rounded-xl p-4 flex items-center justify-between">
                            <div>
                                <h4 class="text-sm font-bold text-white">${item.title}</h4>
                                <p class="text-xs text-zinc-500">${item.specification} — <span class="text-zinc-400 font-semibold">${item.price}</span></p>
                            </div>
                            <button onclick="deleteProduct('${item.id}')" class="bg-red-950/40 text-red-400 border border-red-900/50 hover:bg-red-900 hover:text-white transition px-3 py-1.5 rounded-lg text-xs font-bold cursor-pointer">
                                Remove
                            </button>
                        </div>
                    `;
                });
            } catch (err) {
                container.innerHTML = "<p class='text-red-400 text-xs py-4'>Network connection blocked.</p>";
            }
        }

        document.getElementById('add-product-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const title = document.getElementById('prod-title').value;
            const specification = document.getElementById('prod-spec').value;
            const price = document.getElementById('prod-price').value;
            const photourl = document.getElementById('prod-url').value;

            try {
                const { error } = await supabaseClient
                    .from('products')
                    .insert([{ title, specification, price, photourl }]);

                if (error) {
                    alert("Insertion failed: " + error.message);
                } else {
                    this.reset();
                    fetchAndRenderInventory();
                }
            } catch (err) {
                alert("Request error. Try submitting in an incognito tab.");
            }
        });

        async function deleteProduct(id) {
            if (!confirm("Are you sure you want to remove this product?")) return;

            try {
                const { error } = await supabaseClient
                    .from('products')
                    .delete()
                    .eq('id', id);

                if (error) {
                    alert("Deletion error: " + error.message);
                } else {
                    fetchAndRenderInventory();
                }
            } catch (err) {
                alert("Network error block.");
            }
        }

        document.addEventListener("DOMContentLoaded", fetchAndRenderInventory);
    </script>
</body>
</html>
