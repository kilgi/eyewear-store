<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout Form | Specs & Shade</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans antialiased">

    <nav class="bg-zinc-900 border-b border-zinc-800/50 h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
            <a href="index.html" class="text-white font-black tracking-widest text-sm uppercase">&larr; Back To Catalog</a>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-4 py-16">
        <h1 class="text-3xl font-black tracking-tight text-white mb-2">Secure Order Request</h1>
        <p class="text-zinc-500 text-sm mb-8">Fill out your details below to submit your backup order request.</p>

        <form id="checkout-form" onsubmit="handleOrderSubmission(event)" class="space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2">Full Name</label>
                <input type="text" id="customer_name" required placeholder="John Doe" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-zinc-500 transition">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2">Phone Number</label>
                <input type="tel" id="customer_phone" required placeholder="98XXXXXXXX" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-zinc-500 transition">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2">Selected Product Frame</label>
                <select id="variant_select" required class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-zinc-500 transition">
                    <option value="" disabled selected>Loading variants from store database...</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2">Delivery Address</label>
                <textarea id="customer_address" required rows="3" placeholder="Street Name, House No., City" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-zinc-500 transition resize-none"></textarea>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2">Payment Method</label>
                <select id="payment_method" required class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-zinc-500 transition">
                    <option value="COD">Cash on Delivery (COD)</option>
                    <option value="Prepaid">Prepaid / QR Code Scan</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2">Transaction ID / Reference (Optional)</label>
                <input type="text" id="payment_reference" placeholder="Only required if you paid via QR" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-zinc-500 transition">
            </div>

            <button type="submit" class="w-full bg-white text-black font-black py-3.5 rounded-xl text-sm uppercase tracking-wider hover:bg-zinc-200 transition cursor-pointer">
                Submit Backup Order
            </button>
        </form>
    </main>

    <script>
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1344265741639090207/q3r1E9FvVvSOf-I7b6f6O65nF6N455776O5N4N457nO45N57657nO45n675nO"; // Ensure your correct active webhook is placed here
        const FIREBASE_DB_URL = "https://eyewear-store-4ec1e-default-rtdb.firebaseio.com/";

        // Fetch items directly from Firebase, populate choices, and auto-select the right one
        async function setupDynamicVariants() {
            const selectElement = document.getElementById('variant_select');
            const preselectedProduct = localStorage.getItem('selectedProductTitle');

            try {
                const response = await fetch(`${FIREBASE_DB_URL}products.json`);
                const data = await response.json();

                if (!data) {
                    selectElement.innerHTML = '<option value="" disabled>No products found in system</option>';
                    return;
                }

                // Clear out loading option
                selectElement.innerHTML = '';

                // Dynamically append all database choices
                Object.keys(data).forEach(id => {
                    const item = data[id];
                    const option = document.createElement('option');
                    option.value = item.title;
                    option.textContent = `${item.title} — ${item.price}`;
                    
                    // Auto-select if it matches the variant clicked on the home screen
                    if (preselectedProduct && item.title === preselectedProduct) {
                        option.selected = true;
                    }
                    
                    selectElement.appendChild(option);
                });

            } catch (err) {
                selectElement.innerHTML = '<option value="" disabled>Error loading active variants</option>';
            }
        }

        async function handleOrderSubmission(event) {
            event.preventDefault();

            const name = document.getElementById('customer_name').value;
            const phone = document.getElementById('customer_phone').value;
            const product = document.getElementById('variant_select').value;
            const address = document.getElementById('customer_address').value;
            const method = document.getElementById('payment_method').value;
            const reference = document.getElementById('payment_reference').value || "None (COD Order)";

            const discordMessagePayload = {
                content: `**📦 New Backup Form Submission Received**\n` +
                         `\`\`\`\n` +
                         `Name: ${name}\n` +
                         `Phone: ${phone}\n` +
                         `Product Ordered: ${product}\n` +
                         `Address: ${address}\n` +
                         `Payment Method: ${method}\n` +
                         `Transaction ID/Ref: ${reference}\n` +
                         `\`\`\``
            };

            try {
                const response = await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(discordMessagePayload)
                });

                if (response.ok) {
                    // Clear temporary selection cache
                    localStorage.removeItem('selectedProductTitle');
                    window.location.href = "success.html";
                } else {
                    alert("Something went wrong communicating with notifications server. Please retry.");
                }
            } catch (error) {
                alert("Network error. Please try again.");
            }
        }

        // Run variant calculations when page renders
        document.addEventListener('DOMContentLoaded', setupDynamicVariants);
    </script>
</body>
</html>
