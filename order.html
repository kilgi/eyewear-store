<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout Form | Specs & Shade</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans antialiased">

    <nav class="bg-zinc-900 border-b border-zinc-800/50 h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
            <a href="index.html" class="text-white font-black tracking-widest text-sm uppercase">&larr; Back To Catalog</a>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-4 py-16">
        <h1 class="text-3xl font-black tracking-tight text-white mb-2">Secure Order Request</h1>
        <p class="text-zinc-500 text-sm mb-8">Fill out your details. You can scan our QR code to pay now and upload a receipt, or skip it to pay cash on delivery.</p>

        <!-- Formspree Target Configuration -->
        <form action="https://formspree.io/f/meewyedo" method="POST" enctype="multipart/form-data" class="space-y-6">
            
            <!-- FIXED REDIRECT (Works perfectly for local testing and GitHub Pages) -->
            <input type="hidden" name="_next" value="https://kilgi.github.io/eyewear-store/success.html">

            <!-- Customer Details -->
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2">Full Name</label>
                <input type="text" name="name" required class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-zinc-500 transition">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2">Contact Number</label>
                <input type="tel" name="phone" required class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-zinc-500 transition">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2">Select Frame Variant</label>
                <select id="product-select" name="product" required class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-zinc-500 transition">
                    <option value="The Classic Onyx">The Classic Onyx — Rs. 2,500</option>
                    <option value="The Study Scholar">The Study Scholar — Rs. 2,300</option>
                    <option value="Digital Nomad">Digital Nomad — Rs. 2,650</option>
                    <option value="The Vintage Tortoise">The Vintage Tortoise — Rs. 2,800</option>
                    <option value="The Clear Crystal">The Clear Crystal — Rs. 2,400</option>
                    <option value="Midnight Aviator">Midnight Aviator — Rs. 3,100</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2">Delivery Address Details</label>
                <textarea name="address" rows="3" required class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-zinc-500 transition"></textarea>
            </div>

            <!-- PAYMENT METHOD CHOICE -->
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2">Payment Preference</label>
                <select id="payment-method" name="payment_method" required class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-zinc-500 transition">
                    <option value="Cash on Delivery">Cash on Delivery (COD)</option>
                    <option value="QR Scan Advanced Payment">Scan QR Code Now</option>
                </select>
            </div>

            <!-- OPTIONAL QR PAYMENT BLOCK -->
            <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 space-y-4">
                <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400">Merchant Payment QR (Optional)</label>
                <div class="w-44 h-44 bg-white rounded-xl mx-auto flex items-center justify-center p-2">
                    <img src="qr-placeholder.png" alt="Payment QR Code" class="w-full h-full object-contain">
                </div>
                <p class="text-center text-xs text-zinc-500">Only scan if you selected "Scan QR Code Now" above.</p>
                
                <hr class="border-zinc-800 my-2">

                <!-- Conditional Upload Layer -->
                <div class="space-y-4">
                    <div>
                        <label id="upload-label" class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2">Upload Receipt Photo (Optional)</label>
                        <input type="file" id="receipt_screenshot" name="receipt_screenshot" accept="image/*" class="w-full text-xs text-zinc-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-zinc-800 file:text-white hover:file:bg-zinc-700 cursor-pointer">
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-white text-black font-bold py-3.5 rounded-xl hover:bg-zinc-200 transition-all cursor-pointer shadow-md">
                Submit Secure Order Request
            </button>
        </form>
    </main>

    <!-- Automation Operations Logic -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Part 1: Automated Catalog Dropdown Match
            const savedProduct = localStorage.getItem('selectedProductTitle');
            const selectDropdown = document.getElementById('product-select');
            
            if (savedProduct && selectDropdown) {
                for (let option of selectDropdown.options) {
                    if (option.value === savedProduct) {
                        option.selected = true;
                        break;
                    }
                }
                // Clear out used item token to ensure clean future visits
                localStorage.removeItem('selectedProductTitle');
            }

            // Part 2: Smart File Requirement Validation
            const paymentSelect = document.getElementById('payment-method');
            const fileInput = document.getElementById('receipt_screenshot');
            const uploadLabel = document.getElementById('upload-label');

            function assessValidationRules() {
                if (paymentSelect.value === "QR Scan Advanced Payment") {
                    fileInput.required = true;
                    uploadLabel.innerText = "Upload Receipt Photo (REQUIRED FOR QR PAYMENTS)";
                    uploadLabel.classList.add('text-amber-400');
                } else {
                    fileInput.required = false;
                    uploadLabel.innerText = "Upload Receipt Photo (Optional)";
                    uploadLabel.classList.remove('text-amber-400');
                }
            }

            // Run check on form inputs immediately and listen for changes
            paymentSelect.addEventListener('change', assessValidationRules);
            assessValidationRules();
        });
    </script>
</body>
</html>
